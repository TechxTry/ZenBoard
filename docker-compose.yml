# 全栈编排：PostgreSQL + Redis + backend / frontend
#
# 默认使用 Docker Hub 预构建镜像（无需本地编译前后端）：
#   docker compose pull && docker compose up -d
#
# 从本仓库源码构建镜像（开发 / 验证 Dockerfile）：
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# 使用前：cp .env.example .env，至少修改 JWT_SECRET、ADMIN_PASS
# 访问：http://localhost:${WEB_PORT:-2024}

services:
  postgres:
    image: postgres:15-alpine
    container_name: zenboard_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zenboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zenboard123}
      POSTGRES_DB: ${POSTGRES_DB:-zenboard}
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zenboard} -d ${POSTGRES_DB:-zenboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zenboard_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: ${DOCKERHUB_NAMESPACE:-techxtry}/zenboard-backend:${ZENBOARD_IMAGE_TAG:-latest}
    container_name: zenboard_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "8080"
      PG_DSN: >-
        host=postgres user=${POSTGRES_USER:-zenboard} password=${POSTGRES_PASSWORD:-zenboard123}
        dbname=${POSTGRES_DB:-zenboard} port=5432 sslmode=disable TimeZone=Asia/Shanghai
      REDIS_ADDR: redis:6379
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-change_me_in_production}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      ZT_HOST: ${ZT_HOST:-}
      ZT_PORT: ${ZT_PORT:-3306}
      ZT_USER: ${ZT_USER:-}
      ZT_PASS: ${ZT_PASS:-}
      ZT_DBNAME: ${ZT_DBNAME:-zentao}
      ETL_CONFIG_PATH: ${ETL_CONFIG_PATH:-config/etl_tables.yaml}
    expose:
      - "8080"

  frontend:
    image: ${DOCKERHUB_NAMESPACE:-techxtry}/zenboard-frontend:${ZENBOARD_IMAGE_TAG:-latest}
    container_name: zenboard_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-2024}:80"

volumes:
  pg_data:
  redis_data:
